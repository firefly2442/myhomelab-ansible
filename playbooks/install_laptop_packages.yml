---
- hosts: system76laptop
  vars:
    ubuntu_codename: jammy # 22.04 LTS
  tasks:
  - name: install some popular packages via apt
    become: true
    apt:
      name:
        - gimp
        - inkscape
        - musescore3
        - geany
        - meld
        - wavemon
      state: latest
      install_recommends: yes
      update_cache: yes

  # https://docs.ansible.com/ansible/latest/installation_guide/intro_installation.html#installing-ansible-on-ubuntu
  - name: add ansible from PPA
    become: true
    ansible.builtin.apt_repository:
      repo: ppa:ansible/ansible
  - name: install ansible via apt
    become: true
    apt:
      name:
        - ansible
      state: latest
      install_recommends: yes
      update_cache: yes

  # R programming language
  # https://cran.r-project.org/bin/linux/ubuntu
  - name: add GPG key for R
    become: true
    apt_key:
      url: https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc
      state: present
  - name: add R repository to apt
    become: true
    apt_repository:
      repo: deb https://cloud.r-project.org/bin/linux/ubuntu {{ ubuntu_codename }}-cran40/
      state: present
  - name: install R via apt
    become: true
    apt:
      name:
        - r-base
      state: latest
      update_cache: yes
      install_recommends: yes

  # RStudio IDE
  - name: add RStudio GPG key
    become: true
    # https://www.rstudio.com/code-signing/
    ansible.builtin.shell: gpg --keyserver keyserver.ubuntu.com --recv-keys 3F32EE77E331692F
  - name: download RStudio IDE
    get_url:
      # they don't seem to have a "latest" URL or something we can grab so this just dumps a download in the home folder for now
      # https://www.rstudio.com/products/rstudio/download/#download
      url: https://download1.rstudio.org/electron/jammy/amd64/rstudio-2026.05.1-225-amd64.deb
      dest: ~/
  - name: RStudio IDE message
    debug:
      msg: "RStudio IDE .deb is in the home folder ready to install"

  # Discord
  - name: download and install Discord
    become: true
    apt:
      deb: https://discord.com/api/download?platform=linux&format=deb

  # https://support.system76.com/articles/system76-driver/
  - name: add System76 drivers PPA
    become: true
    ansible.builtin.apt_repository:
      repo: ppa:system76-dev/stable
  - name: install System76 drivers via apt
    become: true
    apt:
      name:
        - system76-driver
      state: latest
      install_recommends: yes
      update_cache: yes

  - name: Ensure required Twingate dependency packages are installed
    become: true
    ansible.builtin.apt:
      name:
        - curl
        - gpg
        - ca-certificates
      state: present
      update_cache: true

  - name: Download Twingate GPG key
    become: true
    ansible.builtin.get_url:
      url: https://packages.twingate.com/apt/gpg.key
      dest: /tmp/twingate.gpg.key
      mode: "0644"

  - name: Convert Twingate GPG key to keyring format
    become: true
    ansible.builtin.command:
      cmd: >
        gpg --dearmor
        -o /usr/share/keyrings/twingate-client-keyring.gpg
        /tmp/twingate.gpg.key
      creates: /usr/share/keyrings/twingate-client-keyring.gpg

  - name: Add Twingate apt repository
    become: true
    ansible.builtin.apt_repository:
      repo: >-
        deb [signed-by=/usr/share/keyrings/twingate-client-keyring.gpg]
        https://packages.twingate.com/apt/ * *
      filename: twingate
      state: present

  - name: Install Twingate
    become: true
    ansible.builtin.apt:
      name: twingate
      state: present
      update_cache: true

  - name: Configure Twingate Message
    debug:
      msg: "Now run: sudo twingate setup"